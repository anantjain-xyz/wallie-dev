<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Your Wallie verification code</title>
  </head>
  <body style="margin: 0; padding: 0; background: #f5f5f5; color: #1d1f22">
    <div style="display: none; max-height: 0; overflow: hidden; opacity: 0; color: transparent">
      Use this six-digit code to verify your identity in Wallie.
    </div>
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="border-collapse: collapse; background: #f5f5f5"
    >
      <tr>
        <td align="center" style="padding: 40px 16px">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="max-width: 560px; border-collapse: collapse"
          >
            <tr>
              <td
                style="
                  padding: 0 0 14px;
                  font-family:
                    Inter,
                    -apple-system,
                    BlinkMacSystemFont,
                    &quot;Segoe UI&quot;,
                    sans-serif;
                  font-size: 20px;
                  font-weight: 700;
                  line-height: 1.2;
                  color: #1d1f22;
                "
              >
                Wallie
              </td>
            </tr>
            <tr>
              <td
                style="
                  border: 1px solid #e0e0e0;
                  border-radius: 8px;
                  background: #ffffff;
                  padding: 32px;
                "
              >
                <h1
                  style="
                    margin: 0 0 12px;
                    font-family:
                      Inter,
                      -apple-system,
                      BlinkMacSystemFont,
                      &quot;Segoe UI&quot;,
                      sans-serif;
                    font-size: 24px;
                    font-weight: 700;
                    line-height: 1.25;
                    color: #1d1f22;
                  "
                >
                  Verify your identity
                </h1>
                <p
                  style="
                    margin: 0 0 24px;
                    font-family:
                      Inter,
                      -apple-system,
                      BlinkMacSystemFont,
                      &quot;Segoe UI&quot;,
                      sans-serif;
                    font-size: 15px;
                    line-height: 1.6;
                    color: #4f545b;
                  "
                >
                  Enter this code in Wallie to continue with the sensitive account action.
                </p>
                <div
                  style="
                    border: 1px solid #e0e0e0;
                    border-radius: 8px;
                    background: #f8f8f8;
                    padding: 20px;
                    text-align: center;
                  "
                >
                  <p
                    style="
                      margin: 0 0 8px;
                      font-family:
                        Inter,
                        -apple-system,
                        BlinkMacSystemFont,
                        &quot;Segoe UI&quot;,
                        sans-serif;
                      font-size: 12px;
                      font-weight: 700;
                      letter-spacing: 0.08em;
                      line-height: 1.4;
                      color: #6b6f76;
                      text-transform: uppercase;
                    "
                  >
                    Verification code
                  </p>
                  <p
                    style="
                      margin: 0;
                      font-family:
                        &quot;IBM Plex Mono&quot;, &quot;SFMono-Regular&quot;, Consolas,
                        &quot;Liberation Mono&quot;, monospace;
                      font-size: 32px;
                      font-weight: 700;
                      letter-spacing: 0.16em;
                      line-height: 1.2;
                      color: #1d1f22;
                    "
                  >
                    {{ .Token }}
                  </p>
                </div>
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 16px 0 0;
                  font-family:
                    Inter,
                    -apple-system,
                    BlinkMacSystemFont,
                    &quot;Segoe UI&quot;,
                    sans-serif;
                  font-size: 12px;
                  line-height: 1.6;
                  color: #8c8f94;
                "
              >
                If you did not request this verification code, you can ignore this email.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
